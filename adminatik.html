<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Dashboard</title>
<style>
body{
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:#0f172a;
  color:#fff;
  padding:20px;
}
table{width:100%;border-collapse:collapse;}
th,td{padding:8px;border:1px solid #3b82f6;font-size:14px;text-align:left;}
th{background:#111827;}
td{background:#1f2937;}
a{color:#3b82f6;text-decoration:none;}
</style>
</head>
<body>

<h2>Admin Dashboard</h2>
<table id="dataTable">
  <thead>
    <tr>
      <th>Answer</th>
      <th>Time</th>
      <th>Latitude</th>
      <th>Longitude</th>
      <th>Map</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
  apiKey:"AIzaSyD-myAkBLFbPyqIomR02q6iftboysae-wQ",
  authDomain:"locationxdd.firebaseapp.com",
  databaseURL:"https://locationxdd-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"locationxdd",
  storageBucket:"locationxdd.firebasestorage.app",
  messagingSenderId:"114480292043",
  appId:"1:114480292043:web:d143429c68784b0706bb4e"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const tbody=document.querySelector("#dataTable tbody");

onValue(ref(db,"visitors"),snapshot=>{
  tbody.innerHTML="";
  snapshot.forEach(child=>{
    const data=child.val();
    tbody.innerHTML+=`
      <tr>
        <td>${data?.answer ?? "-"}</td>
        <td>${data?.time_bst_friendly ?? "-"}</td>
        <td>${data?.lat ?? "-"}</td>
        <td>${data?.lng ?? "-"}</td>
        <td><a href="https://www.google.com/maps?q=${data?.lat},${data?.lng}" target="_blank">📍 Map</a></td>
      </tr>
    `;
  });
});
</script>

</body>
</html>
