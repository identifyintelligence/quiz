<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Dashboard</title>
<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:#0f172a;
  color:#fff;
  display:flex;
  justify-content:center;
  padding:20px;
  min-height:100vh;
}
.container{
  width:100%;
  max-width:900px;
}
h2{
  text-align:center;
  margin-bottom:20px;
}
.table-wrapper{
  background:#111827;
  border-radius:14px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,.4);
  overflow-x:auto;
}
table{
  width:100%;
  border-collapse:collapse;
  min-width:600px;
}
th,td{
  padding:12px 10px;
  text-align:left;
}
th{
  background:#1e293b;
  font-weight:600;
  border-bottom:2px solid #3b82f6;
}
td{
  background:#1f2937;
  border-bottom:1px solid #334155;
}
tr:hover td{
  background:#272f42;
  transition:0.2s;
}
a{
  color:#3b82f6;
  text-decoration:none;
  font-size:16px;
}
a:hover{
  text-decoration:underline;
}
.note{
  font-size:12px;
  opacity:0.6;
  margin-top:10px;
  text-align:right;
}
</style>
</head>
<body>

<div class="container">
  <h2>Admin Dashboard</h2>
  <div class="table-wrapper">
    <table id="dataTable">
      <thead>
        <tr>
          <th>Answer</th>
          <th>Time</th>
          <th>Latitude</th>
          <th>Longitude</th>
          <th>Map</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="note">Data updates in real-time • Keep your Firebase rules secure</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
  apiKey:"AIzaSyD-myAkBLFbPyqIomR02q6iftboysae-wQ",
  authDomain:"locationxdd.firebaseapp.com",
  databaseURL:"https://locationxdd-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"locationxdd",
  storageBucket:"locationxdd.firebasestorage.app",
  messagingSenderId:"114480292043",
  appId:"1:114480292043:web:d143429c68784b0706bb4e"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const tbody=document.querySelector("#dataTable tbody");

onValue(ref(db,"visitors"),snapshot=>{
  tbody.innerHTML="";
  snapshot.forEach(child=>{
    const data=child.val();
    tbody.innerHTML+=`
      <tr>
        <td>${data?.answer ?? "-"}</td>
        <td>${data?.time_bst_friendly ?? "-"}</td>
        <td>${data?.lat ?? "-"}</td>
        <td>${data?.lng ?? "-"}</td>
        <td><a href="https://www.google.com/maps?q=${data?.lat},${data?.lng}" target="_blank">📍</a></td>
      </tr>
    `;
  });
});
</script>

</body>
</html>
