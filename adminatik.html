<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #080d18;
  --surface:   #0d1526;
  --surface2:  #111d35;
  --border:    rgba(59,130,246,.15);
  --border-hi: rgba(59,130,246,.45);
  --accent:    #3b82f6;
  --accent2:   #60a5fa;
  --muted:     rgba(148,163,184,.5);
  --text:      #e2e8f0;
  --text-dim:  #94a3b8;
  --red:       #f87171;
  --green:     #34d399;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 32px 20px 60px;
  /* subtle grid overlay */
  background-image:
    linear-gradient(rgba(59,130,246,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* ─── GLOW BLOB ─── */
body::before {
  content: '';
  position: fixed;
  top: -200px; left: 50%;
  transform: translateX(-50%);
  width: 700px; height: 500px;
  background: radial-gradient(ellipse, rgba(59,130,246,.12) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 960px;
  margin: 0 auto;
}

/* ─── HEADER ─── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
  flex-wrap: wrap;
  gap: 12px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 36px; height: 36px;
  border: 1.5px solid var(--accent);
  border-radius: 8px;
  display: grid;
  place-items: center;
  box-shadow: 0 0 16px rgba(59,130,246,.25);
}

.logo-icon svg { width:18px; height:18px; fill:none; stroke:var(--accent); stroke-width:2; }

.logo-text {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text);
}

.logo-sub {
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--muted);
  letter-spacing: .05em;
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 7px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--green);
  background: rgba(52,211,153,.08);
  border: 1px solid rgba(52,211,153,.2);
  border-radius: 20px;
  padding: 6px 14px;
  letter-spacing: .04em;
}

.status-pill .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: .5; transform: scale(.85); }
}

/* ─── STATS ROW ─── */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
  transition: border-color .2s, transform .2s;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0;
  transition: opacity .3s;
}

.stat-card:hover { border-color: var(--border-hi); transform: translateY(-2px); }
.stat-card:hover::before { opacity: 1; }

.stat-label {
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
  font-weight: 600;
}

.stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 28px;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
}

.stat-value span { font-size: 13px; color: var(--text-dim); margin-left: 4px; }

/* ─── TABLE CARD ─── */
.table-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
}

.table-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 10px;
}

.table-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.count-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  background: rgba(59,130,246,.12);
  color: var(--accent2);
  border: 1px solid rgba(59,130,246,.2);
  border-radius: 6px;
  padding: 3px 10px;
}

.table-wrap { overflow-x: auto; }

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 560px;
}

thead th {
  padding: 11px 20px;
  text-align: left;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--text-dim);
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

tbody tr {
  animation: rowIn .35s ease both;
}

@keyframes rowIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

tbody td {
  padding: 13px 20px;
  font-size: 13px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-dim);
  border-bottom: 1px solid rgba(51,65,85,.5);
  transition: background .15s;
}

tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: rgba(59,130,246,.04); color: var(--text); }

.answer-cell {
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  color: var(--text) !important;
  font-size: 13px !important;
}

.time-cell { color: var(--muted) !important; font-size: 12px !important; }

.coord-cell {
  font-size: 12px !important;
  color: rgba(148,163,184,.6) !important;
}

.map-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--accent);
  background: rgba(59,130,246,.08);
  border: 1px solid rgba(59,130,246,.2);
  border-radius: 6px;
  padding: 5px 11px;
  text-decoration: none;
  transition: background .2s, border-color .2s, box-shadow .2s;
}

.map-link:hover {
  background: rgba(59,130,246,.18);
  border-color: rgba(59,130,246,.5);
  box-shadow: 0 0 12px rgba(59,130,246,.2);
  text-decoration: none;
}

/* ─── EMPTY STATE ─── */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
  font-size: 13px;
  letter-spacing: .05em;
}

.empty svg { margin-bottom: 14px; opacity: .3; }

/* ─── FOOTER ─── */
.footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 6px;
}

.footer-note {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: .04em;
}

/* ─── LOADING SKELETON ─── */
.skeleton td {
  background: transparent !important;
}

.skeleton-line {
  height: 12px;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--surface2) 25%, rgba(30,41,59,.8) 50%, var(--surface2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s ease infinite;
}

@keyframes shimmer {
  from { background-position: 200% 0; }
  to   { background-position: -200% 0; }
}
</style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </div>
      <div>
        <div class="logo-text">Admin Dashboard</div>
        <div class="logo-sub">locationxdd · realtime</div>
      </div>
    </div>
    <div class="status-pill">
      <span class="dot"></span>
      LIVE
    </div>
  </header>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Total Entries</div>
      <div class="stat-value" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">With Location</div>
      <div class="stat-value" id="stat-loc">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Last Updated</div>
      <div class="stat-value" id="stat-time" style="font-size:16px; padding-top:6px;">—</div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-card">
    <div class="table-header">
      <div class="table-title">Visitor Records</div>
      <div class="count-badge" id="count-badge">Loading…</div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Answer</th>
            <th>Timestamp</th>
            <th>Latitude</th>
            <th>Longitude</th>
            <th>Map</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <!-- skeleton rows -->
          <tr class="skeleton"><td><div class="skeleton-line" style="width:80%"></div></td><td><div class="skeleton-line" style="width:70%"></div></td><td><div class="skeleton-line" style="width:60%"></div></td><td><div class="skeleton-line" style="width:60%"></div></td><td><div class="skeleton-line" style="width:40%"></div></td></tr>
          <tr class="skeleton"><td><div class="skeleton-line" style="width:65%"></div></td><td><div class="skeleton-line" style="width:75%"></div></td><td><div class="skeleton-line" style="width:55%"></div></td><td><div class="skeleton-line" style="width:55%"></div></td><td><div class="skeleton-line" style="width:40%"></div></td></tr>
          <tr class="skeleton"><td><div class="skeleton-line" style="width:72%"></div></td><td><div class="skeleton-line" style="width:68%"></div></td><td><div class="skeleton-line" style="width:62%"></div></td><td><div class="skeleton-line" style="width:62%"></div></td><td><div class="skeleton-line" style="width:40%"></div></td></tr>
        </tbody>
      </table>
    </div>
    <div class="footer">
      <span class="footer-note">⬡ Firebase Realtime Database</span>
      <span class="footer-note" id="footer-rule">Keep your security rules tight.</span>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp }        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey:            "AIzaSyD-myAkBLFbPyqIomR02q6iftboysae-wQ",
  authDomain:        "locationxdd.firebaseapp.com",
  databaseURL:       "https://locationxdd-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "locationxdd",
  storageBucket:     "locationxdd.firebasestorage.app",
  messagingSenderId: "114480292043",
  appId:             "1:114480292043:web:d143429c68784b0706bb4e"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const tbody     = document.getElementById("tbody");
const badge     = document.getElementById("count-badge");
const statTotal = document.getElementById("stat-total");
const statLoc   = document.getElementById("stat-loc");
const statTime  = document.getElementById("stat-time");

onValue(ref(db, "visitors"), snapshot => {
  tbody.innerHTML = "";
  let total = 0, withLoc = 0;

  if (!snapshot.exists()) {
    tbody.innerHTML = `
      <tr><td colspan="5" class="empty">
        <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>
        No records found.
      </td></tr>`;
    badge.textContent = "0 records";
    statTotal.textContent = "0";
    statLoc.textContent   = "0";
    statTime.textContent  = "—";
    return;
  }

  snapshot.forEach((child, i) => {
    const d = child.val();
    total++;
    if (d?.lat && d?.lng) withLoc++;

    const hasCoords = d?.lat && d?.lng;
    const row = document.createElement("tr");
    row.style.animationDelay = `${i * 40}ms`;
    row.innerHTML = `
      <td class="answer-cell">${d?.answer ?? "—"}</td>
      <td class="time-cell">${d?.time_bst_friendly ?? "—"}</td>
      <td class="coord-cell">${d?.lat != null ? Number(d.lat).toFixed(5) : "—"}</td>
      <td class="coord-cell">${d?.lng != null ? Number(d.lng).toFixed(5) : "—"}</td>
      <td>${hasCoords
        ? `<a class="map-link" href="https://www.google.com/maps?q=${d.lat},${d.lng}" target="_blank">
             <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
             View
           </a>`
        : '<span style="color:var(--muted);font-family:\'JetBrains Mono\',monospace;font-size:11px;">N/A</span>'
      }</td>
    `;
    tbody.appendChild(row);
  });

  badge.textContent       = `${total} record${total !== 1 ? "s" : ""}`;
  statTotal.textContent   = total;
  statLoc.textContent     = withLoc;
  statTime.textContent    = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
});
</script>
</body>
</html>
